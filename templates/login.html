{% extends "base.html" %}
{% block content %}
<div class="glass-panel" style="max-width: 500px; margin: 0 auto;">
    <h2 class="text-center mb-4">Welcome Back</h2>
    <form method="POST" action="">
        <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" type="password" id="password" name="password" required>
        </div>
        <div class="form-group flex items-center gap-2">
            <input type="checkbox" id="remember" name="remember">
            <label for="remember">Remember Me</label>
        </div>
        <div class="form-group mt-4">
            <button class="btn" style="width: 100%;" type="submit">Login</button>
        </div>
    </form>
    <div class="text-center mt-4 pt-4" style="border-top: 1px solid var(--border-light);">
        <p style="color: var(--text-muted);">Need An Account? <a href="{{ url_for('register') }}">Sign Up Now</a></p>
    </div>
</div>
{% endblock content %}
