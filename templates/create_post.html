{% extends "base.html" %}
{% block content %}
<div class="glass-panel" style="max-width: 800px; margin: 0 auto;">
    <h2 class="mb-4">{{ legend }}</h2>
    <form method="POST" action="">
        <div class="form-group">
            <label class="form-label" for="title">Title</label>
            <input class="form-control" type="text" id="title" name="title" value="{{ post.title if post else '' }}" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="content">Content</label>
            <textarea class="form-control" id="content" name="content" required>{{ post.content if post else '' }}</textarea>
        </div>
        <div class="form-group mt-4">
            <button class="btn" type="submit">{{ legend }}</button>
        </div>
    </form>
</div>
{% endblock content %}
